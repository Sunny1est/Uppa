name: Build Uppa Executable

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "src/assets;assets/" src/main.py --name "Uppa"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Uppa-Windows
        path: dist/Uppa

    - name: Zip Release
      run: Compress-Archive -Path dist/Uppa -DestinationPath Uppa-Windows.zip

    - name: Release to GitHub
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: Uppa-Windows.zip
